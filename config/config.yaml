artifact_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  corpus_dir: synthetic_corpus

chunking:
  root_dir: artifacts/chunking
  chunk_size: 1000
  chunk_overlap: 50

embedding:
  root_dir: artifacts/embedding
  model_name: all-mpnet-base-v2
  vector_store_path: artifacts/embedding/vector_store

retrieval:
  root_dir: artifacts/retrieval
  top_k: 10

generation:
  root_dir: artifacts/generation
  model_name: llama-3.3-70b-versatile
  temperature: 0.4
  max_tokens: 1024

evaluation:
  root_dir: artifacts/evaluation
  eval_set_path: synthetic_corpus/eval_set.jsonl
  judge_model_name: llama-3.3-70b-versatile
  smoke_test_questions: [3, 17, 22, 41, 55, 68, 74, 80, 88, 95]
  keyword_coverage_threshold: 0.7
  accuracy_threshold: 3.5